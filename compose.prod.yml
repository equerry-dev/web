# Production: pull + run the published image on the server. No build.
#
#   # one-time, only if the GHCR package is private:
#   echo "$GHCR_TOKEN" | docker login ghcr.io -u <user> --password-stdin
#
#   docker compose -f compose.prod.yml pull
#   docker compose -f compose.prod.yml up -d
#
# Put `web` behind your reverse proxy (it listens on :8080 by default).
# Pin to a specific :sha tag instead of :latest for reproducible deploys.
#
# The `watchtower` service is optional pull-based CD: it polls GHCR every 5 min
# and restarts ONLY containers labelled watchtower.enable=true (i.e. `web`),
# leaving the rest of the host untouched. Drop it if you prefer manual deploys.
services:
  web:
    image: ghcr.io/equerry-dev/web:latest
    ports:
      - '8080:80'
    restart: unless-stopped
    labels:
      - 'com.centurylinklabs.watchtower.enable=true'
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost/']
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  watchtower:
    image: containrrr/watchtower@sha256:6dd50763bbd632a83cb154d5451700530d1e44200b268a4e9488fefdfcf2b038
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup --label-enable
