# Production: pull + run the published image on the server. No build.
#
# The GHCR package is PRIVATE, so the host must be logged in to ghcr.io with a
# CLASSIC PAT that has `read:packages` (fine-grained PATs can't read GHCR):
#
#   echo "$GHCR_READ_TOKEN" | docker login ghcr.io -u <github-user> --password-stdin
#
# Then:
#   docker compose -f compose.prod.yml pull
#   docker compose -f compose.prod.yml up -d
#
# Put `web` behind your reverse proxy (it listens on :8080 by default).
# Pin to a specific :sha tag instead of :latest for reproducible deploys.
#
# `watchtower` is optional pull-based CD: it polls GHCR every 5 min and restarts
# ONLY containers labelled watchtower.enable=true (i.e. `web`), leaving the rest
# of the host untouched. It reuses the host login via the mounted docker config.
# NB: this needs the credentials stored *in* config.json (the default on a
# headless host). If your host uses a credential helper (credsStore), either
# remove it for this user or run watchtower with REPO_USER/REPO_PASS instead.
services:
  web:
    image: ghcr.io/equerry-dev/web:latest
    ports:
      - '8080:80'
    restart: unless-stopped
    labels:
      - 'com.centurylinklabs.watchtower.enable=true'
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost/']
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  watchtower:
    image: containrrr/watchtower@sha256:6dd50763bbd632a83cb154d5451700530d1e44200b268a4e9488fefdfcf2b038
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.docker/config.json:/config.json:ro
    command: --interval 300 --cleanup --label-enable
