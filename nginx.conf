server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json application/manifest+json;
    gzip_min_length 1024;

    # Content-hashed build assets — safe to cache forever.
    location ^~ /_app/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Prerendered MPA: clean URLs map to <route>.html. No SPA fallback.
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    # Unmatched paths get the branded 404 page (keeps the 404 status).
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
