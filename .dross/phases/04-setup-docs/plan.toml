[phase]
id = "04-setup-docs"

[[task]]
id            = "t-1"
wave          = 1
title         = "Write Install doc page"
files         = ["src/routes/docs/install/+page.svx"]
description   = """
New /docs/install page documenting the install method that works today
(build-from-source / sideloaded APK for dev.equerry.app); Google Play + F-Droid
shown as 'coming soon', never as working steps (r-03).
"""
covers        = ["c-1"]
test_contract = [
  "if the page lists Google Play or F-Droid as a working install method instead of 'coming soon', the install content e2e (t-6) fails",
  "if the build-from-source / sideloaded-APK instructions are removed, the install content e2e (t-6) fails",
]
status        = "pending"

[[task]]
id            = "t-2"
wave          = 1
title         = "Write Set-as-default-assistant page"
files         = ["src/routes/docs/default-assistant/+page.svx"]
description   = """
New /docs/default-assistant page walking the user through Android Settings >
Default apps > Digital assistant > 'Equerry assistant', matching the real
VoiceInteractionService flow — no invented in-app wizard.
"""
covers        = ["c-2"]
test_contract = [
  "if the Settings > Default apps > Digital assistant > 'Equerry assistant' path is missing from the page, the default-assistant content e2e (t-6) fails",
]
status        = "pending"

[[task]]
id            = "t-3"
wave          = 1
title         = "Write Add-a-provider page"
files         = ["src/routes/docs/add-a-provider/+page.svx"]
description   = """
New /docs/add-a-provider page: Ollama-first worked example plus a compact
reference for the other three types. Documents the real form fields (Label, Type,
Base URL, API key where required, Model), that Ollama needs no key, and that keys
are stored encrypted on-device.
"""
covers        = ["c-3"]
test_contract = [
  "if any of Ollama / Anthropic / OpenAI-compatible / OpenRouter is dropped from the page, the provider content e2e (t-6) fails",
  "if the page stops noting Ollama needs no API key or that keys are stored encrypted on-device, the provider content e2e (t-6) fails",
]
status        = "pending"

[[task]]
id            = "t-4"
wave          = 1
title         = "Write Capability-Slots page"
files         = ["src/routes/docs/capability-slots/+page.svx"]
description   = """
New /docs/capability-slots page: explains the slot concept and walks through
mapping a provider to the CHAT slot (the only active slot in v0.1), marking
Vision/STT/TTS/OCR/Embeddings as 'coming soon'.
"""
covers        = ["c-4"]
test_contract = [
  "if the page shows a non-CHAT slot as active, the slots content e2e (t-6) fails",
  "if 'coming soon' is dropped from Vision/STT/TTS/OCR/Embeddings, the slots content e2e (t-6) fails",
]
status        = "pending"

[[task]]
id            = "t-5"
wave          = 2
depends_on    = ["t-1", "t-2", "t-3", "t-4"]
title         = "Rewire docs nav + index orientation/maturity callout"
files         = [
  "src/lib/docs/nav.ts",
  "src/routes/docs/+page.svelte",
  "src/routes/docs/docs-index.svelte.test.ts",
  "src/routes/docs/getting-started/+page.svx",
  "src/routes/docs/configuration/+page.svx",
]
description   = """
Replace the two placeholder pages in docsNav with the four real pages, grouped
'Getting Started' (install, default-assistant) and 'Configuration'
(add-a-provider, capability-slots), in that reading order. Add the 'what works
today' maturity callout + orientation to the /docs index. Delete the old
getting-started and configuration .svx routes. Update the docs-index unit test to
assert the maturity callout renders.
"""
covers        = ["c-5", "c-6"]
test_contract = [
  "if the four pages aren't ordered install -> default-assistant -> add-a-provider -> capability-slots in docsNav, the nav flatten/adjacent specs fail",
  "if the /docs 'what works today' maturity callout is removed, the docs-index unit test fails",
]
status        = "pending"

[[task]]
id            = "t-6"
wave          = 3
depends_on    = ["t-5"]
title         = "Update docs e2e for the setup walkthrough"
files         = ["e2e/docs.e2e.ts"]
description   = """
Rewrite the docs e2e for the new page set (the old slugs and headings are gone):
assert the ordered install -> ... -> capability-slots walkthrough via sidebar and
prev/next with no dead links, the index maturity callout, and the per-page content
assertions backing c-1..c-4 (store=coming-soon, assistant settings path, four
provider types + Ollama-no-key, CHAT-only/coming-soon slots).
"""
covers        = ["c-5", "c-6"]
test_contract = [
  "if any setup page 404s or a sidebar/prev-next link is dead, the docs walkthrough e2e fails",
  "if prev/next doesn't traverse all four setup pages in reading order, the ordering e2e fails",
  "if a per-page content assertion (store=coming-soon, assistant path, four provider types, CHAT-only) regresses, its e2e check fails",
]
status        = "pending"
