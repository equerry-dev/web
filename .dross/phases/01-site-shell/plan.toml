[phase]
id = "01-site-shell"

[[task]]
id            = "t-1"
wave          = 1
title         = "Theme store + no-flash bootstrap"
files         = ["src/lib/theme.svelte.ts", "src/app.html"]
description   = """
Theme state ('light' | 'dark'): initialise from localStorage, else OS prefers-color-scheme.
Toggle applies the .dark class on <html> and persists. Add a pre-paint inline script in
app.html that sets the class before first paint to avoid FOUC.
"""
covers        = ["c-2"]
test_contract = [
  "if the pre-paint inline script in app.html is removed, an e2e assertion that <html> carries the stored theme class on first load fails (FOUC)",
  "if the toggle does not write localStorage, an e2e reload test that the chosen theme persists fails",
  "with empty storage and prefers-color-scheme:dark, if OS preference is not honored the first-visit-dark e2e assertion fails",
]
status        = "pending"

[[task]]
id            = "t-2"
wave          = 1
title         = "Base components: Button + BrandMark"
files         = ["src/lib/components/Button.svelte", "src/lib/components/BrandMark.svelte"]
description   = """
Button with variant prop (primary / ghost) mapping to the Field Guide theme utilities.
BrandMark: wordmark 'Equerry' in the display font plus a self-made placeholder geometric SVG mark.
"""
covers        = ["c-6"]
test_contract = [
  "if the Button variant prop stops mapping primary/ghost to distinct classes, the Button unit test fails",
  "if BrandMark omits the 'Equerry' wordmark text, its render test fails",
]
status        = "pending"

[[task]]
id            = "t-3"
wave          = 2
depends_on    = ["t-1", "t-2"]
title         = "Header: desktop nav + toggle + CTA + hamburger"
files         = ["src/lib/components/Header.svelte", "src/lib/components/ThemeToggle.svelte"]
description   = """
Persistent header: brand left; right-side Features (#features / /#features), Docs, GitHub
icon-link (inline SVG), a primary Download CTA, the theme toggle, and a hamburger button
(controls the mobile drawer added in t-5). Responsive: full nav on desktop, hamburger below breakpoint.
"""
covers        = ["c-1", "c-3"]
test_contract = [
  "if any of the Features/Docs/GitHub/Download nav items is dropped, the Header render test asserting their hrefs fails",
  "if the Download CTA href is wrong, the Header test fails",
]
status        = "pending"

[[task]]
id            = "t-4"
wave          = 2
depends_on    = ["t-2"]
title         = "Footer: minimal row"
files         = ["src/lib/components/Footer.svelte"]
description   = """
Minimal single-row footer: brand + Docs, GitHub, F-Droid, and License links + copyright.
GitHub/F-Droid icons are inline SVG (no external requests).
"""
covers        = ["c-1"]
test_contract = [
  "if a footer link (Docs/GitHub/F-Droid/License) or the copyright is removed, the Footer render test fails",
]
status        = "pending"

[[task]]
id            = "t-5"
wave          = 3
depends_on    = ["t-3"]
title         = "Mobile slide-over drawer + focus-trap"
files         = ["src/lib/components/MobileNav.svelte"]
description   = """
Off-canvas slide-over drawer (from the right) opened by the header hamburger; holds the nav
links, Download CTA, and theme toggle. Focus-trapped while open; Esc closes and restores focus.
"""
covers        = ["c-3", "c-5"]
test_contract = [
  "if focus is not trapped, an e2e test where Tab past the last drawer item should wrap to the first fails",
  "if Esc does not close the drawer and restore focus to the hamburger, the e2e test fails",
  "if aria-expanded on the hamburger does not reflect the open state, the e2e test fails",
]
status        = "pending"

[[task]]
id            = "t-6"
wave          = 4
depends_on    = ["t-3", "t-4", "t-5"]
title         = "Assemble shell in layout + a11y + privacy checks"
files         = ["src/routes/+layout.svelte", "src/routes/+page.svelte", "src/routes/layout.css", "e2e/shell.test.ts"]
description   = """
Wrap all routes with Header + Footer in +layout.svelte; add a skip-to-content link and a
<main> landmark. Replace the placeholder home page so it renders within the shell. Add e2e
covering skip-link, zero third-party requests, and an axe scan.
"""
covers        = ["c-1", "c-4", "c-5"]
test_contract = [
  "if the skip-link is not the first focusable element or does not move focus to <main>, the e2e test fails",
  "if loading / or a second route issues any non-same-origin network request, the zero-third-party e2e test fails",
  "if an axe-core scan of / reports violations (landmarks or AA contrast), the e2e test fails",
  "if the header or footer is missing on any route, the e2e test fails",
]
status        = "pending"
