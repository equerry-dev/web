<!doctype html>

<html lang="%paraglide.lang%" dir="%paraglide.dir%">
	<head>
		<meta charset="utf-8" />

		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<meta name="text-scale" content="scale" />
		<script>
			// Pre-paint: set the theme class before first paint to avoid a flash.
			// Mirrors resolveInitialTheme() in src/lib/theme.svelte.ts.
			(function () {
				try {
					var stored = localStorage.getItem('equerry-theme');
					var dark =
						stored === 'dark' ||
						(stored !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
					if (dark) document.documentElement.classList.add('dark');
				} catch (e) {
					/* localStorage unavailable — fall back to light */
				}
			})();
		</script>
		<link
			rel="icon"
			href="/favicon.svg"
			media="(prefers-color-scheme: light)"
			type="image/svg+xml"
		/>
		<link
			rel="icon"
			href="/favicon-dark.svg"
			media="(prefers-color-scheme: dark)"
			type="image/svg+xml"
		/>
		<link rel="icon" href="/favicon.ico" media="(prefers-color-scheme: light)" sizes="any" />
		<link rel="icon" href="/favicon-dark.ico" media="(prefers-color-scheme: dark)" sizes="any" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/site.webmanifest" />
		<!-- Self-hosted, cookieless Umami: script served same-origin (/umami.js);
		     only the aggregate page-view beacon goes to the Umami instance. -->
		<script
			defer
			src="/umami.js"
			data-website-id="1bfaf8df-b439-4711-ad6e-c49f00565980"
			data-host-url="https://umami.rivil.co.uk"
		></script>
		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
